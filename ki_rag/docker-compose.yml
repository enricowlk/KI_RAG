services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # host.docker.internal ist der magische Befehl, damit Docker auf deinen Mac zugreift
        OLLAMA_BASE_URL: http://host.docker.internal:11434/api
    container_name: ki_rag_frontend
    ports:
      - "3000:3000"
    environment:
      # Auch zur Laufzeit muss die URL auf deinen Mac zeigen
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/api
    restart: unless-stopped